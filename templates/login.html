<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHome – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-body">

  <!-- Animated background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand text-center mb-4">
        <div class="brand-icon mb-3">
          <i class="fa-solid fa-house-signal"></i>
        </div>
        <h1 class="brand-title">SmartHome</h1>
        <p class="brand-sub">Control your world from one place</p>
      </div>

      <!-- Error alert -->
      {% if error %}
      <div class="alert alert-danger login-alert d-flex align-items-center gap-2" role="alert">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <!-- Login form -->
      <form method="POST" action="/login" class="login-form" novalidate>
        <div class="form-group mb-3">
          <label class="form-label text-muted small fw-semibold">USERNAME</label>
          <div class="input-icon-wrap">
            <i class="fa-solid fa-user input-icon"></i>
            <input
              type="text"
              name="username"
              class="form-control login-input"
              placeholder="Enter your username"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="form-group mb-4">
          <label class="form-label text-muted small fw-semibold">PASSWORD</label>
          <div class="input-icon-wrap">
            <i class="fa-solid fa-lock input-icon"></i>
            <input
              type="password"
              name="password"
              id="passwordInput"
              class="form-control login-input"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="password-toggle" onclick="togglePassword()">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn login-btn w-100">
          <span>Sign In</span>
          <i class="fa-solid fa-arrow-right ms-2"></i>
        </button>
      </form>

      <p class="text-center mt-4 hint-text">
        <i class="fa-solid fa-circle-info me-1"></i>
        Default: <strong>admin</strong> / <strong>admin123</strong>
      </p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input   = document.getElementById("passwordInput");
      const icon    = document.getElementById("eyeIcon");
      const isText  = input.type === "text";
      input.type    = isText ? "password" : "text";
      icon.className = isText ? "fa-solid fa-eye" : "fa-solid fa-eye-slash";
    }
  </script>
</body>
</html>
